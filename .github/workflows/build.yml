name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes to check for updates
  workflow_dispatch:       # Allows manual triggering

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Configure TLS 1.2
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      shell: pwsh

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Get version from AssemblyInfo
      id: get_version
      run: |
        $content = Get-Content 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' | 
                  Select-String -Pattern 'AssemblyVersion\("([0-9.]+)"\)' | 
                  ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "version=$content" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Fetch all tags
      run: |
        git fetch --all --tags
      shell: pwsh

    - name: Generate changelog for current release
      id: generate_changelog
      shell: pwsh
      run: |
        # Get all tags and sort them by version
        $allTags = git tag -l | Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' } | Sort-Object { [version]$_ }
        $currentVersion = "${{ steps.get_version.outputs.version }}"
        
        # Find the previous tag
        $previousTag = $null
        for ($i = 0; $i -lt $allTags.Count; $i++) {
          # Look for the tag that precedes the current version
          if ($allTags[$i] -eq $currentVersion -and $i -gt 0) {
            $previousTag = $allTags[$i - 1]
            break
          }
        }
        # If no exact previous tag is found, take the last one from the list
        if (-not $previousTag) {
            $previousTag = $allTags | Where-Object { [version]$_ -lt [version]$currentVersion } | Select-Object -Last 1
        }

        # Define the commit range
        $range = if ($previousTag) { "${previousTag}..${currentVersion}" } else { $currentVersion }
        Write-Host "Generating changelog for range: $range"
        
        # Format the changelog
        $commits = git log $range --pretty=format:"* %s (%ad)" --date=short --no-merges
        
        $changelogText = if ($commits) {
          "**Changelog:**`n" + ($commits -join "`n")
        } else {
          "**Changelog:**`n* No new changes found for this release."
        }
        
        # Write the changelog to a file for the next step
        Set-Content -Path "release_body.md" -Value $changelogText -Encoding utf8

    - name: Fix all existing releases changelog (one-time run)
      # This step only runs on manual trigger to fix historical releases
      if: github.event_name == 'workflow_dispatch'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "=== Starting retroactive changelog fix ==="
        
        $releasesUri = "https://api.github.com/repos/${{ github.repository }}/releases"
        $releases = Invoke-RestMethod -Uri $releasesUri -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"}
        Write-Host "Found $($releases.Count) releases to check."
        
        $allTags = git tag -l | Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' } | Sort-Object { [version]$_ }
        
        foreach ($release in $releases) {
          $currentVersion = $release.tag_name
          $previousTag = $null
          for ($i = 0; $i -lt $allTags.Count; $i++) {
            if ($allTags[$i] -eq $currentVersion -and $i -gt 0) {
              $previousTag = $allTags[$i - 1]
              break
            }
          }
          
          $range = if ($previousTag) { "${previousTag}..${currentVersion}" } else { $currentVersion }
          Write-Host "Processing $currentVersion, range: $range"
          
          $commits = git log $range --pretty=format:"* %s (%ad)" --date=short --no-merges
          
          $changelogText = if ($commits) { "**Changelog:**`n" + ($commits -join "`n") } else { "**Changelog:**`n* No new changes found for this release." }
          
          $updateUri = "https://api.github.com/repos/${{ github.repository }}/releases/$($release.id)"
          $payload = @{ body = $changelogText } | ConvertTo-Json
          
          try {
            Invoke-RestMethod -Uri $updateUri -Method Patch -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github.v3+json" } -Body $payload -ContentType "application/json"
            Write-Host "  ✓ Updated release $currentVersion"
          } catch {
            Write-Host "  ✗ Failed to update release $currentVersion"
          }
          Start-Sleep -Seconds 1
        }
        Write-Host "=== Retroactive changelog fix completed ==="

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: Create artifact directory
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "DDU ${{ steps.get_version.outputs.version }}"
        files: DDU-Build.zip
        body_path: "release_body.md" # Uses the changelog file
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
