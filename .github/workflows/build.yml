name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes to check for updates
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Configure TLS 1.2
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      shell: pwsh

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Get version from AssemblyInfo
      id: get_version
      run: |
        $content = Get-Content 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' | 
                  Select-String -Pattern 'AssemblyVersion\("([0-9.]+)"\)' | 
                  ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "version=$content" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Fetch all tags
      run: git fetch --tags upstream
      shell: pwsh

    - name: Check existing release
      id: check_release
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $tag = "${{ steps.get_version.outputs.version }}"
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
        try {
          $release = Invoke-RestMethod -Uri $uri -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"}
          echo "release_id=$($release.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } catch {
          echo "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: List output directory
      run: |
        Get-ChildItem -Recurse "display-driver-uninstaller/Display Driver Uninstaller/bin/Release"
      shell: pwsh

    - name: Create artifact
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Update existing release
      if: steps.check_release.outputs.exists == 'true'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $releaseId = "${{ steps.check_release.outputs.release_id }}"
        $currentVersion = "${{ steps.get_version.outputs.version }}"
        
        # Создаем URI для API
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/$releaseId"
        
        # Удаляем старые assets
        $release = Invoke-RestMethod -Uri $uri -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
        foreach($asset in $release.assets) {
          Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($asset.id)" `
                          -Method Delete `
                          -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
        }
        
        # Получаем все теги и сортируем их по версии
        $allTags = git tag -l | Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' } | Sort-Object { [version]$_ }
        
        # Находим предыдущий тег (не текущий)
        $previousTag = $null
        for ($i = 0; $i -lt $allTags.Count; $i++) {
          if ($allTags[$i] -eq $currentVersion -and $i -gt 0) {
            $previousTag = $allTags[$i - 1]
            break
          }
        }
        
        # Если предыдущий тег не найден, берем последний тег (исключая текущий)
        if (-not $previousTag) {
          $previousTag = $allTags | Where-Object { $_ -ne $currentVersion } | Select-Object -Last 1
        }
        
        Write-Host "Current version: $currentVersion"
        Write-Host "Previous tag: $previousTag"
        
        # Определяем диапазон коммитов
        $range = if ($previousTag) { 
          "${previousTag}..upstream/WPF" 
        } else { 
          # Если нет предыдущего тега, берем только последние коммиты (например, за последний месяц)
          git log --since="1 month ago" --pretty=format:"%H" upstream/WPF | Select-Object -Last 1
          if ($lastCommit) {
            "${lastCommit}..upstream/WPF"
          } else {
            "upstream/WPF"
          }
        }
        
        Write-Host "Git range: $range"
        
        # Формируем changelog только для новых коммитов
        $commits = git log $range --pretty=format:"%s (%ad)" --date=short --no-merges |
                  Where-Object {
                    $_ -notmatch "^Merge " -and
                    $_ -notmatch "^feat: " -and
                    $_ -notmatch "^fix: "
                  } |
                  ForEach-Object { 
                    # Убираем все начальные дефисы и пробелы
                    $clean = $_ -replace '^[\s\-]*', ''
                    "* $clean"
                  }
        
        # Для отладки
        Write-Host "Formatted commits:"
        $commits | ForEach-Object { Write-Host "[$_]" }
        
        # Создаем тело запроса через PowerShell-объект
        $changelogText = if ($commits.Count -gt 0) {
          "**Changelog:**`n" + ($commits -join "`n")
        } else {
          "**Changelog:**`n* No new changes found"
        }
        
        $payload = @{
          body = $changelogText
        } | ConvertTo-Json
        
        # Обновляем релиз
        Invoke-RestMethod -Uri $uri `
                        -Method Patch `
                        -Headers @{
                          Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                          Accept = "application/vnd.github.v3+json"
                        } `
                        -Body $payload `
                        -ContentType "application/json"
        
        # Загружаем новый ZIP
        Invoke-RestMethod -Uri "https://uploads.github.com/repos/${{ github.repository }}/releases/$releaseId/assets?name=DDU-Build.zip" `
                        -Method Post `
                        -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" } `
                        -InFile "DDU-Build.zip" `
                        -ContentType "application/zip"

    - name: Create new release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "DDU ${{ steps.get_version.outputs.version }}"
        files: DDU-Build.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}