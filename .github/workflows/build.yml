name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight UTC to check for updates
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: List output directory
      run: |
        Get-ChildItem -Recurse "display-driver-uninstaller/Display Driver Uninstaller/bin/Release"
      shell: pwsh

    - name: Create artifact
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: DDU-Build
        path: DDU-Build.zip

    - name: Create GitHub Release and Upload zip
      uses: softprops/action-gh-release@v2
      if: github.ref_type == 'tag'
      with:
        files: DDU-Build.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
