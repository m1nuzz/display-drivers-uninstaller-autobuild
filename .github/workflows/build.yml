# ... [rest of the file content unchanged until the Generate Changelog step]

name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Configure TLS 1.2
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      shell: pwsh

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Get version from AssemblyInfo
      id: get_version
      run: |
        $content = Get-Content 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' | 
                  Select-String -Pattern 'AssemblyVersion\("([0-9.]+)"\)' | 
                  ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "version=$content" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Fetch all tags
      run: git fetch --tags upstream
      shell: pwsh

    - name: Check existing release
      id: check_release
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $tag = "${{ steps.get_version.outputs.version }}"
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
        try {
          $release = Invoke-RestMethod -Uri $uri -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"}
          echo "release_id=$($release.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } catch {
          echo "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: List output directory
      run: |
        Get-ChildItem -Recurse "display-driver-uninstaller/Display Driver Uninstaller/bin/Release"
      shell: pwsh

    - name: Create artifact
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Generate Changelog
      id: generate_changelog
      if: steps.check_release.outputs.exists == 'true'
      shell: pwsh
      run: |
        # Get all version tags and sort them
        $allTags = git tag -l --sort=-v:refname | Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' }
        $currentTag = "${{ steps.get_version.outputs.version }}"
        
        Write-Host "Current tag being processed: $currentTag"
        Write-Host "Available tags: $($allTags -join ', ')"
        
        # Initialize dates
        $currentTagDate = $null
        $previousTagDate = $null
        
        # Try to get the current tag date
        try {
            $currentTagDate = git log -1 --format=%ai "$currentTag"
            Write-Host "Found date for current tag: $currentTagDate"
        } catch {
            Write-Host "Current tag $currentTag not found in git history, using HEAD date"
            $currentTagDate = git log -1 --format=%ai HEAD
        }
        
        # Find the previous tag
        $previousTag = $null
        if ($allTags) {
            $currentTagIndex = [array]::IndexOf($allTags, $currentTag)
            if ($currentTagIndex -lt ($allTags.Length - 1)) {
                $previousTag = $allTags[$currentTagIndex + 1]
                try {
                    $previousTagDate = git log -1 --format=%ai $previousTag
                    Write-Host "Found previous tag $previousTag with date: $previousTagDate"
                } catch {
                    Write-Host "Could not get date for previous tag $previousTag"
                    $previousTagDate = $null
                }
            }
        }

        Write-Host "Processing commits between dates: $previousTagDate -> $currentTagDate"

        # Get commits
        $commits = git log --pretty=format:"%H|%s|%ai" --no-merges |
            ForEach-Object {
                $parts = $_ -split '\|'
                if ($parts.Length -eq 3) {
                    try {
                        @{
                            Hash = $parts[0]
                            Subject = $parts[1]
                            Date = [DateTime]::Parse($parts[2])
                        }
                    } catch {
                        Write-Host "Error parsing commit: $_"
                        $null
                    }
                } else {
                    Write-Host "Skipping malformed commit line: $_"
                    $null
                }
            } |
            Where-Object { $_ -ne $null } |
            Where-Object {
                $date = $_.Date
                if ($previousTagDate) {
                    $prevDate = [DateTime]::Parse($previousTagDate)
                    $date -gt $prevDate
                }
                $date -le [DateTime]::Parse($currentTagDate) -and
                $_.Subject -notmatch "^(Release|Possible release)" -and
                $_.Subject -notmatch "^Merge" -and
                $_.Subject -notmatch "^feat: " -and
                $_.Subject -notmatch "^fix: "
            } |
            Sort-Object -Property Date |
            Select-Object -Property @{
                Name = 'FormattedMessage'
                Expression = {
                    $clean = $_.Subject -replace '^[\s\-]*', ''
                    "- $clean ($($_.Date.ToString('yyyy-MM-dd')))"
                }
            } |
            Select-Object -Unique

        # Create changelog
        $changelogBody = @"
### Changelog for $currentTag ($(([DateTime]::Parse($currentTagDate)).ToString('yyyy-MM-dd')))

$($commits.FormattedMessage -join "`n")
"@
        
        $changelogBody | Out-File -FilePath changelog.md -Encoding utf8
        echo "changelog=$changelogBody" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Update existing release
      if: steps.check_release.outputs.exists == 'true'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $releaseId = "${{ steps.check_release.outputs.release_id }}"
        
        # Get changelog content
        $changelogContent = Get-Content -Path changelog.md -Raw
        
        # Create body for API request
        $payload = @{
            body = $changelogContent
        } | ConvertTo-Json
        
        # Update release
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/$releaseId"
        Invoke-RestMethod -Uri $uri `
            -Method Patch `
            -Headers @{
                Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                Accept = "application/vnd.github.v3+json"
            } `
            -Body $payload `
            -ContentType "application/json"
        
        # Upload new ZIP
        Invoke-RestMethod -Uri "https://uploads.github.com/repos/${{ github.repository }}/releases/$releaseId/assets?name=DDU-Build.zip" `
            -Method Post `
            -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" } `
            -InFile "DDU-Build.zip" `
            -ContentType "application/zip"

    - name: Create new release
      if: steps.check_release.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "DDU ${{ steps.get_version.outputs.version }}"
        files: DDU-Build.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-old-releases:
    needs: sync-and-build
    runs-on: windows-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Fetch all tags
      run: |
        git fetch --tags --force
      shell: pwsh

    - name: Update old releases
      shell: pwsh
      run: |
        # Get all version tags
        $allTags = git tag -l --sort=v:refname | Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' }
        
        Write-Host "Found tags: $($allTags -join ', ')"
        
        # Process each tag
        foreach ($tag in $allTags) {
            Write-Host "Processing tag: $tag"
            
            # Get current and previous tag
            $currentTagIndex = [array]::IndexOf($allTags, $tag)
            $previousTag = if ($currentTagIndex -gt 0) { $allTags[$currentTagIndex - 1] } else { $null }
            
            # Get tag dates
            try {
                $currentTagDate = git log -1 --format=%ai $tag
            } catch {
                Write-Host "Failed to get date for tag $tag, skipping"
                continue
            }
            
            try {
                $previousTagDate = if ($previousTag) { git log -1 --format=%ai $previousTag }
            } catch {
                Write-Host "Failed to get date for previous tag $previousTag, using null"
                $previousTagDate = $null
            }
            
            Write-Host "Current tag: $tag at $currentTagDate"
            Write-Host "Previous tag: $previousTag at $previousTagDate"
            
            # Get commits between tags
            $commits = git log --pretty=format:"%H|%s|%ai" --no-merges |
                ForEach-Object {
                    $parts = $_ -split '\|'
                    if ($parts.Length -eq 3) {
                        try {
                            @{
                                Hash = $parts[0]
                                Subject = $parts[1]
                                Date = [DateTime]::Parse($parts[2])
                            }
                        } catch {
                            Write-Host "Error parsing commit: $_"
                            $null
                        }
                    } else {
                        Write-Host "Skipping malformed commit line: $_"
                        $null
                    }
                } |
                Where-Object { $_ -ne $null } |
                Where-Object {
                    $date = $_.Date
                    if ($previousTagDate) {
                        $prevDate = [DateTime]::Parse($previousTagDate)
                        $date -gt $prevDate
                    }
                    $date -le [DateTime]::Parse($currentTagDate) -and
                    $_.Subject -notmatch "^(Release|Possible release)" -and
                    $_.Subject -notmatch "^Merge" -and
                    $_.Subject -notmatch "^feat: " -and
                    $_.Subject -notmatch "^fix: "
                } |
                Sort-Object -Property Date |
                Select-Object -Property @{
                    Name = 'FormattedMessage'
                    Expression = {
                        $clean = $_.Subject -replace '^[\s\-]*', ''
                        "- $clean ($($_.Date.ToString('yyyy-MM-dd')))"
                    }
                } |
                Select-Object -Unique

            # Create changelog
            $changelogBody = @"
### Changelog for $tag ($(([DateTime]::Parse($currentTagDate)).ToString('yyyy-MM-dd')))

$($commits.FormattedMessage -join "`n")
"@

            # Get release ID
            $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
            try {
                $release = Invoke-RestMethod -Uri $uri -Headers @{
                    Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                }
                
                # Update release description
                $updateUri = "https://api.github.com/repos/${{ github.repository }}/releases/$($release.id)"
                $payload = @{
                    body = $changelogBody
                } | ConvertTo-Json

                Invoke-RestMethod -Uri $updateUri `
                    -Method Patch `
                    -Headers @{
                        Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                        Accept = "application/vnd.github.v3+json"
                    } `
                    -Body $payload `
                    -ContentType "application/json"
                
                Write-Host "Updated changelog for $tag"
            } catch {
                Write-Host "Failed to update release $tag: $_"
            }
            
            # Add delay between updates
            Start-Sleep -Seconds 2
        }