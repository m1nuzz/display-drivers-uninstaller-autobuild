name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes to check for updates
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Configure TLS 1.2
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      shell: pwsh

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Get version from AssemblyInfo
      id: get_version
      run: |
        $content = Get-Content 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' | 
                  Select-String -Pattern 'AssemblyVersion\("([0-9.]+)"\)' | 
                  ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "version=$content" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Fetch all tags
      run: git fetch --tags upstream
      shell: pwsh

    - name: Check existing release
      id: check_release
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $tag = "${{ steps.get_version.outputs.version }}"
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
        try {
          $release = Invoke-RestMethod -Uri $uri -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"}
          echo "release_id=$($release.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } catch {
          echo "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Get version commit date
      id: get_version_date
      shell: pwsh
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        
        # Ищем коммит где была изменена версия в AssemblyInfo.vb
        $versionCommit = git log --oneline --follow -p -- 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' |
                        Select-String -Pattern "AssemblyVersion.*$($version.Replace('.', '\.'))" -Context 5,0 |
                        ForEach-Object {
                          # Извлекаем хеш коммита из контекста
                          $_.Context.PreContext | Where-Object { $_ -match '^commit\s+([a-f0-9]{40})' } | 
                          ForEach-Object { $matches[1] }
                        } | Select-Object -First 1
        
        if ($versionCommit) {
          # Получаем дату этого коммита
          $commitDate = git show -s --format=%ci $versionCommit
          echo "version_commit=$versionCommit" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "version_date=$commitDate" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Found version commit: $versionCommit at $commitDate"
        } else {
          Write-Host "Version commit not found, will use all commits"
          echo "version_commit=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "version_date=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        }

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: List output directory
      run: |
        Get-ChildItem -Recurse "display-driver-uninstaller/Display Driver Uninstaller/bin/Release"
      shell: pwsh

    - name: Create artifact
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Update existing release
      if: steps.check_release.outputs.exists == 'true'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        $releaseId = "${{ steps.check_release.outputs.release_id }}"
        
        # Создаем URI для API
        $uri = "https://api.github.com/repos/${{ github.repository }}/releases/$releaseId"
        
        # Удаляем старые assets
        $release = Invoke-RestMethod -Uri $uri -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
        foreach($asset in $release.assets) {
          Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($asset.id)" `
                          -Method Delete `
                          -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
        }
        
        # Определяем диапазон коммитов на основе даты версии
        $versionCommit = "${{ steps.get_version_date.outputs.version_commit }}"
        $versionDate = "${{ steps.get_version_date.outputs.version_date }}"
        
        if ($versionCommit -and $versionDate) {
          # Используем коммиты после коммита с версией
          $range = "$versionCommit..upstream/WPF"
          Write-Host "Using range from version commit: $range"
        } else {
          # Fallback к старой логике
          $latestTag = git tag -l --sort=-v:refname |
                      Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' } |
                      Select-Object -First 1
          $range = if ($latestTag) { "$latestTag..upstream/WPF" } else { "upstream/WPF" }
          Write-Host "Using fallback range: $range"
        }
        
        # Формируем changelog с фильтрацией
        $commits = git log $range --pretty=format:"%s (%ad)" --date=short --no-merges |
                  Where-Object {
                    # Исключаем merge коммиты и служебные коммиты
                    $_ -notmatch "^Merge " -and
                    $_ -notmatch "^feat: " -and
                    $_ -notmatch "^fix: " -and
                    $_ -notmatch "^Update AssemblyInfo" -and
                    $_ -notmatch "^Version bump" -and
                    $_ -notmatch "^\s*$"  # Исключаем пустые строки
                  } |
                  ForEach-Object { 
                    # Убираем все начальные дефисы и пробелы
                    $clean = $_ -replace '^[\s\-]*', ''
                    "- $clean"
                  } |
                  Select-Object -Unique  # Убираем дубликаты
        
        # Для отладки
        Write-Host "Version commit date: $versionDate"
        Write-Host "Commit range: $range"
        Write-Host "Found $($commits.Count) commits for changelog"
        Write-Host "Formatted commits:"
        $commits | ForEach-Object { Write-Host "[$_]" }
        
        # Создаем changelog
        $changelogBody = if ($commits.Count -gt 0) {
          "### Changelog:`n" + ($commits -join "`n")
        } else {
          "### Changelog:`n- No new changes found"
        }
        
        # Создаем тело запроса через PowerShell-объект
        $payload = @{
          body = $changelogBody
        } | ConvertTo-Json
        
        # Обновляем релиз
        Invoke-RestMethod -Uri $uri `
                        -Method Patch `
                        -Headers @{
                          Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                          Accept = "application/vnd.github.v3+json"
                        } `
                        -Body $payload `
                        -ContentType "application/json"
        
        # Загружаем новый ZIP
        Invoke-RestMethod -Uri "https://uploads.github.com/repos/${{ github.repository }}/releases/$releaseId/assets?name=DDU-Build.zip" `
                        -Method Post `
                        -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" } `
                        -InFile "DDU-Build.zip" `
                        -ContentType "application/zip"

    - name: Create new release
      if: steps.check_release.outputs.exists == 'false'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        
        # Определяем диапазон коммитов на основе даты версии
        $versionCommit = "${{ steps.get_version_date.outputs.version_commit }}"
        $versionDate = "${{ steps.get_version_date.outputs.version_date }}"
        
        if ($versionCommit -and $versionDate) {
          # Используем коммиты после коммита с версией
          $range = "$versionCommit..upstream/WPF"
          Write-Host "Using range from version commit: $range"
        } else {
          # Fallback к старой логике
          $latestTag = git tag -l --sort=-v:refname |
                      Where-Object { $_ -match '^\d+\.\d+\.\d+(\.\d+)?$' } |
                      Select-Object -First 1
          $range = if ($latestTag) { "$latestTag..upstream/WPF" } else { "upstream/WPF" }
          Write-Host "Using fallback range: $range"
        }
        
        # Формируем changelog
        $commits = git log $range --pretty=format:"%s (%ad)" --date=short --no-merges |
                  Where-Object {
                    $_ -notmatch "^Merge " -and
                    $_ -notmatch "^feat: " -and
                    $_ -notmatch "^fix: " -and
                    $_ -notmatch "^Update AssemblyInfo" -and
                    $_ -notmatch "^Version bump" -and
                    $_ -notmatch "^\s*$"
                  } |
                  ForEach-Object { 
                    $clean = $_ -replace '^[\s\-]*', ''
                    "- $clean"
                  } |
                  Select-Object -Unique
        
        $changelogBody = if ($commits.Count -gt 0) {
          "### Changelog:`n" + ($commits -join "`n")
        } else {
          "### Changelog:`n- Initial release"
        }
        
        # Создаем релиз через API
        $payload = @{
          tag_name = "${{ steps.get_version.outputs.version }}"
          name = "DDU ${{ steps.get_version.outputs.version }}"
          body = $changelogBody
          draft = $false
          prerelease = $false
        } | ConvertTo-Json
        
        $createUri = "https://api.github.com/repos/${{ github.repository }}/releases"
        $newRelease = Invoke-RestMethod -Uri $createUri `
                                      -Method Post `
                                      -Headers @{
                                        Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                                        Accept = "application/vnd.github.v3+json"
                                      } `
                                      -Body $payload `
                                      -ContentType "application/json"
        
        # Загружаем ZIP файл
        Invoke-RestMethod -Uri "https://uploads.github.com/repos/${{ github.repository }}/releases/$($newRelease.id)/assets?name=DDU-Build.zip" `
                        -Method Post `
                        -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" } `
                        -InFile "DDU-Build.zip" `
                        -ContentType "application/zip"
