name: Build DDU

on:
  push:
    branches: [ WPF ]
  pull_request:
    branches: [ WPF ]
  schedule:
    - cron: '*/15 * * * *'  # Запускать каждые 15 минут для проверки обновлений
  workflow_dispatch:      # Разрешить ручной запуск

jobs:
  sync-and-build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up git user
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
      shell: pwsh

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Configure TLS 1.2
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
      shell: pwsh

    - name: Sync with upstream
      run: |
        git remote add upstream https://github.com/Wagnard/display-drivers-uninstaller.git
        git fetch upstream
        git checkout WPF
        git merge upstream/WPF
      shell: pwsh

    - name: Get version from AssemblyInfo
      id: get_version
      run: |
        $content = Get-Content 'display-driver-uninstaller/Display Driver Uninstaller/My Project/AssemblyInfo.vb' | 
                  Select-String -Pattern 'AssemblyVersion\("([0-9.]+)"\)' | 
                  ForEach-Object { $_.Matches[0].Groups[1].Value }
        echo "version=$content" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: pwsh

    - name: Fetch all tags
      run: |
        git fetch --all --tags
      shell: pwsh

    - name: Generate changelog for current release
      id: generate_changelog
      shell: pwsh
      run: |
        $currentVersion = "${{ steps.get_version.outputs.version }}"
        $commits = ""
        try {
          # ОКОНЧАТЕЛЬНОЕ РЕШЕНИЕ: Анализируем разницу между родителями коммита слияния
          $range = "${currentVersion}^1..${currentVersion}^2"
          Write-Host "Generating changelog by inspecting merge commit parents: $range"
          $commits = git log $range --pretty=format:"* %s (%ad)" --date=short
        } catch {
            Write-Host "Could not generate changelog for tag $currentVersion. It might not be a merge commit."
        }

        $changelogText = if ($commits) {
          "**Changelog:**`n" + ($commits -join "`n")
        } else {
          "**Changelog:**`n* No new changes found for this release."
        }
        
        Set-Content -Path "release_body.md" -Value $changelogText -Encoding utf8

    - name: Fix all existing releases changelog (one-time run)
      if: github.event_name == 'workflow_dispatch'
      shell: pwsh
      run: |
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "=== Starting retroactive changelog fix ==="
        
        $releasesUri = "https://api.github.com/repos/${{ github.repository }}/releases"
        $releases = Invoke-RestMethod -Uri $releasesUri -Headers @{Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"}
        
        foreach ($release in $releases) {
          $currentVersion = $release.tag_name
          $commits = ""
          try {
            # Используем тот же надежный метод для исправления старых релизов
            $range = "${currentVersion}^1..${currentVersion}^2"
            Write-Host "Processing $currentVersion, inspecting merge commit parents: $range"
            $commits = git log $range --pretty=format:"* %s (%ad)" --date=short
          } catch {
             Write-Host "Could not process tag $currentVersion. Skipping."
          }

          $changelogText = if ($commits) { "**Changelog:**`n" + ($commits -join "`n") } else { "**Changelog:**`n* No changes found for this release." }
          
          if ($release.body -ne $changelogText) {
            $updateUri = "https://api.github.com/repos/${{ github.repository }}/releases/$($release.id)"
            $payload = @{ body = $changelogText } | ConvertTo-Json
            Invoke-RestMethod -Uri $updateUri -Method Patch -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github.v3+json" } -Body $payload -ContentType "application/json"
            Write-Host "  ✓ Updated release $currentVersion"
            Start-Sleep -Seconds 1
          } else {
            Write-Host "  - Changelog for $currentVersion is already up to date. Skipping."
          }
        }
        Write-Host "=== Retroactive changelog fix completed ==="

    - name: Restore NuGet packages
      run: nuget restore "display-driver-uninstaller/Display Driver Uninstaller.sln"
      shell: pwsh

    - name: Build solution
      run: |
        msbuild "display-driver-uninstaller/Display Driver Uninstaller.sln" /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal
      shell: pwsh

    - name: Create artifact directory
      run: |
        mkdir artifact
        Copy-Item "display-driver-uninstaller/Display Driver Uninstaller/bin/Release/*" -Destination "artifact/" -Recurse
      shell: pwsh

    - name: Zip build output
      run: |
        Compress-Archive -Path artifact/* -DestinationPath DDU-Build.zip
      shell: pwsh

    - name: Create or Update Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: "DDU ${{ steps.get_version.outputs.version }}"
        files: DDU-Build.zip
        body_path: "release_body.md"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
